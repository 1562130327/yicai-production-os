<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溢彩 Production OS</title>
<style>
:root {
  --bg-root: #080d12;
  --bg-panel: #0f1620;
  --bg-input: #0a1018;
  --border: #1a2a3a;
  --border-focus: #4fc3f7;
  --text: #c8d6e5;
  --text-dim: #4a6680;
  --accent: #4fc3f7;
  --danger: #ef5350;
  --warning: #ff8f00;
  --font: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  --mono: 'Consolas', 'Courier New', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font);
  background:var(--bg-root);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-box{
  width:380px;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:2px;
  padding:44px 40px 36px;
  position:relative;
}
.login-box::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.brand{
  text-align:center;
  margin-bottom:36px;
}
.brand .name{
  font-family:var(--mono);
  font-size:36px;
  color:var(--accent);
  letter-spacing:10px;
}
.brand .ver{
  font-size:11px;
  color:var(--text-dim);
  letter-spacing:4px;
  margin-top:6px;
  font-family:var(--mono);
}
.field{margin-bottom:18px}
.field label{
  display:block;
  font-size:10px;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:4px;
  font-family:var(--mono);
}
.field input{
  width:100%;
  padding:10px 12px;
  background:var(--bg-input);
  border:1px solid var(--border);
  color:var(--text);
  font-size:14px;
  font-family:var(--font);
  border-radius:2px;
  outline:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--border-focus)}
.btn{
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  color:var(--bg-root);
  font-size:14px;
  font-weight:600;
  font-family:var(--font);
  letter-spacing:2px;
  cursor:pointer;
  border-radius:2px;
  margin-top:4px;
  transition:background .15s;
}
.btn:hover{background:#81d4fa}
.msg{
  color:var(--danger);
  font-size:12px;
  text-align:center;
  margin-top:14px;
  min-height:18px;
  opacity:0;
  transition:opacity .2s;
}
.msg.show{opacity:1}
.foot{
  text-align:center;
  margin-top:28px;
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:1px;
  font-family:var(--mono);
}
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="name">溢 彩</div>
    <div class="ver">PRODUCTION OS</div>
  </div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="用户名" autocomplete="off">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="密码">
  </div>
  <button class="btn" onclick="doLogin()">进入系统</button>
  <div class="msg" id="msg"></div>
  <div class="foot">FACTORY MES · NODE 18+ · SQLITE</div>
</div>
<script>
async function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value.trim();
  const m=document.getElementById('msg');
  if(!u||!p){m.textContent='请输入用户名和密码';m.classList.add('show');return}
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){localStorage.setItem('token',d.data.token);localStorage.setItem('user',JSON.stringify(d.data.user));location.href='/app/index.html'}
    else{m.textContent=d.error||'登录失败';m.classList.add('show')}
  }catch(e){m.textContent='无法连接服务器';m.classList.add('show')}
}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
</script>
</body>
</html>
